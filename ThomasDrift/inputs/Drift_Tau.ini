##
[Grid]
X1-grid    1  0.4      512  u  2.5
X2-grid    1  -0.0125      1  u  0.0125
X3-grid    1  -0.0125  1    u  0.0125

[TimeIntegrator]
CFL         0.5
tstop       2000
first_dt    1.0e-5
nstages     2

[Hydro]
solver    hllc
csiso     userdef
# viscosity    explicit  userdef

[Dust]
nSpecies         3
drag             userdef  1   0.2   0.04    # St=1, 0.2, 0.04
drag_feedback    no

[Gravity]
potential    central 
Mcentral     1.0

[Boundary]
X1-beg    userdef
X1-end    userdef
X2-beg    periodic
X2-end    periodic
X3-beg    outflow
X3-end    outflow

[Setup]
sigma0        0.125
sigmaSlope    -0.5
CsSlope       -0.5
h0            0.05
alpha         1.0e-4

[Output]
uservar    cs
vtk    10.0
dmp    100.0
log        1000
dmp_dir    /home/dp316/dp316/dc-fang1/IdefixRuns/ThomasDrift/outputs/Drift_Tau
vtk_dir    /home/dp316/dp316/dc-fang1/IdefixRuns/ThomasDrift/outputs/Drift_Tau/vtks